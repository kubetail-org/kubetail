name: publish-guru

permissions:
  contents: read

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: true

jobs:
  publish:
    environment: production
    runs-on: ubuntu-24.04
    steps:
      - name: Configure workflow
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/cli/v}"
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "archive_name=kubetail-${VERSION}-vendored.tar.gz" >> $GITHUB_OUTPUT

      - name: Download source bundle
        uses: robinraju/release-downloader@v1.12
        with:
          repository: kubetail-org/kubetail
          tag: ${{ format('cli/v{0}', steps.config.outputs.version) }}
          fileName: ${{ steps.config.outputs.archive_name }}
          out-file-path: "downloads"

      - name: Extract metadata
        id: meta
        working-directory: ./downloads
        env:
          ARCHIVE_NAME: ${{ steps.config.outputs.archive_name }}
        run: |
          SIZE=$(stat --format '%s' "$ARCHIVE_NAME")
          BLAKE2B=$(b2sum "$ARCHIVE_NAME" | awk '{print $1}')
          SHA512=$(sha512sum "$ARCHIVE_NAME" | awk '{print $1}')

          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "blake2b=$BLAKE2B" >> "$GITHUB_OUTPUT"
          echo "sha512=$SHA512" >> "$GITHUB_OUTPUT"

      - name: Checkout GURU repo
        run: |
          git clone --depth 1 --branch dev --single-branch https://github.com/gentoo/guru.git
          git -C guru remote add fork https://x-access-token:${{ secrets.PUBLISH_GURU_GITHUB_TOKEN }}@github.com/amorey/guru.git

      - name: Checkout kubetail repo
        uses: actions/checkout@v5
        with:
          sparse-checkout: .github/ci-config/guru
          sparse-checkout-cone-mode: false
          path: kubetail

      - name: Create ebuild file
        env:
          SRC_DIR: kubetail/.github/ci-config/guru
          DST_DIR: guru/dev-util/kubetail
        run: |
          cp "$SRC_DIR/kubetail.ebuild" "$DST_DIR/kubetail-${{ steps.config.outputs.version}}.ebuild"

      - name: Update Manifest
        working-directory: guru/dev-util/kubetail
        run: |
          prefix="DIST kubetail-${{ steps.config.outputs.version }}-vendored.tar.gz"
          if ! grep -qF "$prefix" Manifest 2>/dev/null; then
            echo "$prefix ${{ steps.meta.outputs.size }} BLAKE2B ${{ steps.meta.outputs.blake2b }} SHA512 ${{ steps.meta.outputs.sha512 }}" >> Manifest
          fi

      - name: Trim old ebuilds
        working-directory: guru/dev-util/kubetail
        run: |
          set -euo pipefail
          mapfile -t ebuilds < <(ls -1 kubetail-*.ebuild 2>/dev/null | sort -V)
          total=${#ebuilds[@]}
          if [ "$total" -le 3 ]; then
            echo "Only $total ebuilds present; nothing to trim"
            exit 0
          fi
          to_remove=("${ebuilds[@]:0:$((total - 3))}")
          for ebuild in "${to_remove[@]}"; do
            version="${ebuild#kubetail-}"
            version="${version%.ebuild}"
            echo "Removing $ebuild and its Manifest entry"
            rm -f "$ebuild"
            escaped="${version//./\\.}"
            sed -i "/^DIST kubetail-${escaped}-vendored\.tar\.gz /d" Manifest
          done

      - name: Run pkgcheck
        run: |
          docker run --rm \
            -v "$PWD/guru:/guru" \
            -w /guru/dev-util/kubetail \
            gentoo/stage3 \
            bash -c '
              set -euo pipefail
              emerge-webrsync >/dev/null 2>&1 || true
              emerge -1q dev-util/pkgcheck
              pkgcheck scan -v --exit warning
            '

      - name: Start gpg-agent
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          if ! grep -q "allow-preset-passphrase" ~/.gnupg/gpg-agent.conf 2>/dev/null; then
            echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          fi
          gpgconf --kill gpg-agent || true
          gpgconf --launch gpg-agent

      - name: Configure gpg
        uses: crazy-max/ghaction-import-gpg@v6.3.0
        with:
          gpg_private_key: ${{ secrets.ANDRES_GPG_SIGNING_KEY }}
          passphrase: ${{ secrets.ANDRES_GPG_PASSWORD }}
          fingerprint: ${{ vars.ANDRES_GPG_SIGNING_KEY_FINGERPRINT }}

      - name: Configure git
        working-directory: guru
        run: |
          # Configure git
          git config gpg.program gpg
          git config commit.gpgsign true

          git config user.name "Andres Morey"
          git config user.email "andres@kubetail.com"
          git config user.signingkey "${{ vars.ANDRES_GPG_SIGNING_KEY_FINGERPRINT }}"

      - name: Debug
        if: ${{ steps.config.outputs.dry_run == 'true' }}
        working-directory: guru/dev-util/kubetail
        run: |
          ls -lah *
          cat kubetail-${{ steps.config.outputs.version }}.ebuild
          cat Manifest

      - name: Push changes and open PR
        working-directory: guru
        if: ${{ steps.config.outputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.PUBLISH_GURU_GITHUB_TOKEN }}
          VERSION: ${{ steps.config.outputs.version }}
        run: |
          # Stage changes
          git add . --all

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Create branch, commit, and push to fork
          BRANCH="kubetail-${VERSION}"
          git checkout -b "$BRANCH"
          git commit -a -s -S -m "dev-util/kubetail: add ${VERSION}"
          git push --force fork "$BRANCH"

          # Open PR against gentoo/guru:dev
          gh pr create \
            --repo gentoo/guru \
            --base dev \
            --head "amorey:${BRANCH}" \
            --draft \
            --title "dev-util/kubetail: add ${VERSION}" \
            --body "Adds dev-util/kubetail-${VERSION}"

      - name: Cleanup GPG
        if: always()
        run: rm -rf ~/.gnupg
