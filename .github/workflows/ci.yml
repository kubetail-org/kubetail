name: ci

permissions:
  contents: read

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  rust-build:
    name: Rust · Build
    strategy:
      matrix:
        os:
          - linux
        arch:
          - amd64
          - arm64
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-rust: "true"
          setup-protoc: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        working-directory: ./crates
        run: cargo build --release

  rust-lint:
    name: Rust · Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-rust: "true"
          setup-protoc: "true"
      - name: Run format check
        working-directory: ./crates
        run: cargo fmt --all -- --check

  rust-vet:
    name: Rust · Vet
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-rust: "true"
          setup-protoc: "true"
      - name: Run clippy
        working-directory: ./crates
        run: cargo clippy --all -- -D warnings

  rust-test:
    name: Rust · Test
    strategy:
      matrix:
        os:
          - linux
        arch:
          - amd64
          - arm64
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-rust: "true"
          setup-protoc: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        working-directory: ./crates
        run: cargo test

  go-vendor:
    name: Go · Vendor
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-go: "true"
      - name: Create vendor bundle
        working-directory: ./modules
        run: go work vendor
      - name: Upload vendor bundle artifact
        uses: actions/upload-artifact@v5
        with:
          name: go-vendor-bundle
          path: modules/vendor
          retention-days: 1

  go-lint:
    name: Go · Lint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module:
          - cli
          - cluster-api
          - dashboard
          - shared
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-go: "true"
      - name: Run linter for ${{ matrix.module }}
        working-directory: ./modules/${{ matrix.module }}
        run: test -z "$(gofmt -l .)"

  go-vet:
    name: Go · Vet
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module:
          - cli
          - cluster-api
          - dashboard
          - shared
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-go: "true"
      - name: Vet ${{ matrix.module }}
        working-directory: ./modules/${{ matrix.module }}
        run: go vet ./...

  go-test:
    name: Go · Test
    needs: go-vendor
    timeout-minutes: 20
    strategy:
      matrix:
        module:
          - cli
          - cluster-api
          - dashboard
          - shared
        os:
          - linux
          - macos-15
          - macos-26
          - windows
        arch:
          - amd64
          - arm64
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos-15
            arch: amd64
            runner: macos-15-intel
          - os: macos-15
            arch: arm64
            runner: macos-15
          - os: macos-26
            arch: arm64
            runner: macos-26
          - os: windows
            arch: amd64
            runner: windows-2025
          - os: windows
            arch: arm64
            runner: windows-11-arm
        exclude:
          - os: macos-26
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-go: "true"
      - name: Download vendor bundle artifact
        uses: actions/download-artifact@v5
        with:
          name: go-vendor-bundle
          path: modules/vendor
      - name: Run tests
        working-directory: ./modules/${{ matrix.module }}
        run: go test -mod=vendor ./...
      - name: Run race tests
        if: ${{ !(matrix.os == 'windows' && matrix.arch == 'arm64') }}
        working-directory: ./modules/${{ matrix.module }}
        run: go test -race -mod=vendor ./...

  typescript-lint:
    name: TypeScript · Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-node: "true"
      - name: Install dependencies
        working-directory: ./dashboard-ui
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: ./dashboard-ui
        run: pnpm lint

  typescript-test:
    name: TypeScript · Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-node: "true"
      - name: Install dependencies
        working-directory: ./dashboard-ui
        run: pnpm install --frozen-lockfile
      - name: Test
        working-directory: ./dashboard-ui
        run: pnpm test run

  typescript-build:
    name: TypeScript · Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-node: "true"
      - name: Install dependencies
        working-directory: ./dashboard-ui
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: ./dashboard-ui
        run: pnpm build

  docker-builds:
    name: Docker · Build
    needs:
      - rust-build
      - rust-lint
      - rust-vet
      - rust-test
      - go-lint
      - go-vet
      - go-test
      - typescript-lint
      - typescript-test
      - typescript-build
    timeout-minutes: 20
    strategy:
      matrix:
        component:
          - cli
          - cluster-agent
          - cluster-api
          - dashboard
        arch:
          - amd64
          - arm64
        target:
          - final
          - final-alpine
        include:
          # --- for arches ---
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
          # --- for components --
          - component: cli
            dockerfile: build/package/Dockerfile.cli
          - component: cluster-agent
            dockerfile: build/package/Dockerfile.cluster-agent
          - component: cluster-api
            dockerfile: build/package/Dockerfile.cluster-api
          - component: dashboard
            dockerfile: build/package/Dockerfile.dashboard
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.target }}-${{
            matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.target
            }}-${{ matrix.arch }}

  cli-builds:
    name: CLI · Build
    needs:
      - rust-build
      - rust-lint
      - rust-vet
      - rust-test
      - go-lint
      - go-vet
      - go-test
      - typescript-lint
      - typescript-test
      - typescript-build
    strategy:
      matrix:
        os:
          - linux
          - macos-15
          - macos-26
          - windows
        arch:
          - amd64
          - arm64
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
            platform: linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-15
            arch: amd64
            runner: macos-15-intel
            platform: macos-amd64
          - os: macos-15
            arch: arm64
            runner: macos-15
            platform: macos-arm64
          - os: macos-26
            arch: arm64
            runner: macos-26
            platform: macos-arm64
          - os: windows
            arch: amd64
            runner: windows-2025
            platform: windows-amd64
          - os: windows
            arch: arm64
            runner: windows-11-arm
            platform: windows-arm64
        exclude:
          - os: macos-26
            arch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-node: "true"
          setup-go: "true"
      - name: Build
        run: make build
        env:
          PLATFORM: ${{ matrix.platform }}

  alpine-builds:
    name: Alpine · Build
    needs:
      - rust-build
      - rust-lint
      - rust-vet
      - rust-test
      - go-vendor
      - go-lint
      - go-vet
      - go-test
      - typescript-lint
      - typescript-test
      - typescript-build
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86
          - armhf
          - armv7
          - loongarch64
          - ppc64le
          - riscv64
          - s390x
        include:
          - arch: x86
            goarch: "386"
          - arch: armhf
            goarch: arm
            goarm: "6"
          - arch: armv7
            goarch: arm
            goarm: "7"
          - arch: loongarch64
            goarch: loong64
          - arch: ppc64le
            goarch: ppc64le
          - arch: riscv64
            goarch: riscv64
          - arch: s390x
            goarch: s390x
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-go: "true"
      - name: Download vendor bundle artifact
        uses: actions/download-artifact@v5
        with:
          name: go-vendor-bundle
          path: modules/vendor
      - name: Setup Alpine
        uses: jirutka/setup-alpine@v1
        with:
          arch: ${{ matrix.arch }}
          branch: edge
      - name: Build
        working-directory: ./modules/cli
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -mod=vendor -o ../../bin/kubetail .
      - name: Verify
        shell: alpine.sh {0}
        run: |
          set -ex
          ./bin/kubetail serve --test

  e2e:
    name: E2E (k8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - k8s-version: "1.21"
            kind-node-image: "kindest/node:v1.21.14"
          - k8s-version: "1.25"
            kind-node-image: "kindest/node:v1.25.16"
          - k8s-version: "latest"
            kind-node-image: ""
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-node: "true"
          setup-go: "true"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run e2e tests
        env:
          KIND_NODE_IMAGE: ${{ matrix.kind-node-image }}
        run: make test-e2e
